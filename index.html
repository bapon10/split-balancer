<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>Splitwise Clean</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    .entry {
      background: #eee;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
    }
  </style>

</head>

<body>

<div class="box">

<h2>Splitwise Lite</h2>

<button onclick="login()">Login</button>

<p id="user"></p>

<input type="number" id="amount" placeholder="Amount you paid">
<button onclick="add()">Add Expense</button>

<div id="list"></div>
<div id="result" class="result"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
// import firebaseConfig from './config.js';

const firebaseConfig = {
  apiKey: "AIzaSyDM8h9QGwRNZlF3JXzbdSjzzTmRLRFQYc4",
  authDomain: "splitwiser-shreyan.firebaseapp.com",
  databaseURL: "https://splitwiser-shreyan-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "splitwiser-shreyan",
  storageBucket: "splitwiser-shreyan.firebasestorage.app",
  messagingSenderId: "270734554091",
  appId: "1:270734554091:web:742e2e9302acac57b4dfae",
  measurementId: "G-H1MME1T04J"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const refDB = ref(db, "group1");
let currentUser = null;

window.login = function () {
  signInWithPopup(auth, provider).catch(err => alert("Login failed: " + err.message));
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("user").textContent = "Logged in as " + user.displayName;
  }
});

window.add = function () {
  if (!currentUser) { alert("Login first"); return; }
  const amount = parseFloat(document.getElementById("amount").value);
  if (isNaN(amount) || amount <= 0) { alert("Enter valid amount"); return; }

  push(refDB, {
    amount,
    paidBy: currentUser.uid,
    name: currentUser.displayName,
    timestamp: Date.now()         // useful for ordering later
  })
  .then(() => { document.getElementById("amount").value = ""; })
  .catch(err => alert("Write failed: " + err.message));
};

onValue(refDB, (snap) => {
  const data = snap.val() || {};
  const entries = Object.values(data);

  // Sort by timestamp so newest shows at bottom
  entries.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

  let totals = {};
  let nameMap = {};
  const list = document.getElementById("list");
  list.innerHTML = "";

  entries.forEach((e, i) => {
    if (!totals[e.paidBy]) totals[e.paidBy] = 0;
    totals[e.paidBy] += e.amount;
    nameMap[e.paidBy] = e.name;

    const div = document.createElement("div");
    div.className = "entry";
    // Show index, name, and amount clearly
    div.textContent = `#${i + 1}  ${e.name} paid ₹${e.amount.toFixed(2)}`;
    list.appendChild(div);
  });

  // Show per-user running totals
  const result = document.getElementById("result");
  let summary = "";
  for (const uid in totals) {
    summary += `${nameMap[uid]}: ₹${totals[uid].toFixed(2)} total paid\n`;
  }

  const users = Object.keys(totals);
  if (users.length === 2) {
    const [u1, u2] = users;
    const net = (totals[u1] - totals[u2]) / 2;
    if (net > 0) {
      summary += `\n→ ${nameMap[u2]} owes ${nameMap[u1]} ₹${net.toFixed(2)}`;
    } else if (net < 0) {
      summary += `\n→ ${nameMap[u1]} owes ${nameMap[u2]} ₹${Math.abs(net).toFixed(2)}`;
    } else {
      summary += "\n✓ All settled!";
    }
  }

  result.style.whiteSpace = "pre-line";
  result.textContent = summary;
});
</script>
</body>
</html>
